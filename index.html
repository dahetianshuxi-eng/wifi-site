    <title>水戸駅の無料Wi-Fiまとめ</title>
    <link rel="stylesheet" href="style.css">

</head>
<div class="container">

    <h1>水戸駅の無料Wi-Fiまとめ</h1>

    <p>水戸駅で使える無料Wi-Fiの場所をまとめました。</p>

    <div class="card">
   <h2>① 駅構内のWi-Fi</h2>
    <p>改札付近で利用可能。
        接続にはログインが必要。</p>
    </div>

    <div class="card">
    <h2>② カフェのWi-Fi</h2>
    <p>スタバやその他のカフェで利用可能。
        速度も速め。
    </p>
    </div>

    <div class="card">
    <h2>ウェルシアのWi-Fi</h2>
    <p>exel南や吉野家の隣のウェルシアで使用可能。
        吉野家の隣のウェルシアでは吉野家の店内でも使用可能。
    </p>
    </div>
    
</div>
</html>
